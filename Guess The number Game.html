<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess The Number Game</title>
</head>
<body>
    <script>
        let random = Math.floor(Math.random() * 100 ) +1 ;
        let guess = 0;
        let input;
        console.log(random);
        

        while(true){
            input = prompt("enter a number :- ")

            if(input === null){
                console.log("game cancellled");
                break;
            }
        input = Number(input);
        guess++;

        if(random === input){
            console.log("your number :- " + random + " is guessed");
            console.log("Total guesses :- " + guess);
            console.log("your score is :- " + (100-guess));
            break;
        }
        else if(random < input){
            console.log(" Your guess is greater")
        }
        else{
            console.log(" your guess is smaller")

        }
    }
        
    </script>
</body>
